name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # macOS-13 (Intel) runners are extremely backlogged on the free
        # GitHub-hosted pool — a single tag was stuck in queue for >2 h.
        # macOS-arm64 covers every Apple Silicon Mac (2020+). We'll add
        # macos-x64 back behind a `[ci-full]` opt-in once we move to a
        # paid runner pool.
        platform:
          - { name: "macos-arm64", os: "macos-14", rust-target: "aarch64-apple-darwin",        artifact: "**/release/bundle/dmg/*.dmg" }
          - { name: "linux-x64",   os: "ubuntu-22.04", rust-target: "x86_64-unknown-linux-gnu", artifact: "**/release/bundle/appimage/*.AppImage" }
          - { name: "windows-x64", os: "windows-2022", rust-target: "x86_64-pc-windows-msvc",   artifact: "**/release/bundle/msi/*.msi" }
    defaults:
      run:
        working-directory: memory
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            librsvg2-dev libssl-dev libayatana-appindicator3-dev \
            pkg-config build-essential

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: memory/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: memory/src-tauri

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build --target ${{ matrix.platform.rust-target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cairn-${{ matrix.platform.name }}
          path: memory/src-tauri/target/${{ matrix.platform.rust-target }}/${{ matrix.platform.artifact }}
          if-no-files-found: error

  extension:
    name: Build · chrome-extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: memory/tools/browser-ext
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: memory/tools/browser-ext/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Zip unpacked extension
        # Ship the built `dist/` so users can load it via
        # chrome://extensions → "Load unpacked" until we're on the Web Store.
        run: |
          cd dist
          zip -r "../cairn-chrome-extension-${{ github.ref_name }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cairn-chrome-extension
          path: memory/tools/browser-ext/cairn-chrome-extension-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          # Any tag with a pre-release suffix (-alpha/-beta/-rc) is published
          # as a GitHub pre-release rather than "Latest".
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/cairn-chrome-extension-*.zip
